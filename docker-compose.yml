version: '3.8'

services:
  backend:
    build: ./backend
    container_name: strm-generator-backend
    ports:
      - "3011:3011"
    volumes:
      - /data/clouddrive/gdrive:/data/clouddrive/gdrive:ro
      - /opt/strm:/app/output
      - strm-data:/app/data
    environment:
      - STRM_SOURCE_DIR=/data/clouddrive/gdrive
      - STRM_OUTPUT_DIR=/app/output
      - STRM_BASE_DIR=/app/data
      - STRS_AUTH_USER=${STRS_AUTH_USER:-change_me}
      - STRS_AUTH_PASS=${STRS_AUTH_PASS:-change_me_now}
      - EMBY_URL=${EMBY_URL:-http://emby:8096}
      - EMBY_API_KEY=${EMBY_API_KEY:-replace_with_real_key}
      - EMBY_RECENT_DAYS=${EMBY_RECENT_DAYS:-7}
    restart: unless-stopped
    networks:
      - strm-net

  frontend:
    build: ./frontend
    container_name: strm-generator-frontend
    ports:
      - "8888:80"
    restart: unless-stopped
    networks:
      - strm-net
    depends_on:
      - backend

networks:
  strm-net:
    driver: bridge

volumes:
  strm-data:
